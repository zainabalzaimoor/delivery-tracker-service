<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Your Password</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <h3>New Password</h3>

    <form th:action="@{/api/auth/reset-password-ui}" method="post">
        <input type="hidden" name="token" th:value="${token}" />

        <input type="password" name="newPassword" placeholder="Enter new password" required />
        <button type="submit">Update Password</button>
    </form>
</div>
</body>
</html>
